<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page design</title>
    <style>
        * {
            padding: 0;
            margin: 0;
        }

        .nav {
            width: 100%;
            height: 7vh;
            background: #f86cff;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .bb {
            background: green;
            width: 80vw;
            height: 110vh;
            margin: auto;
            margin-top: 10px;


        }

        .box {
            width: 30vw;
            height: 70vh;
            display: inline-block;

        }

        .box1 {
            background: #ba9f9f;
            margin: 20px;
        }

        .box2 {
            background: #617fca;
            margin: 20px;
            margin-left: 210px;
        }

        .logo {
            border: 2px solid black;
            width: 50px;
            height: 50px;
            border-radius: 100%;
            text-align: center;
            position: fixed;
            bottom: 0;
            right: 0;
        }

        .content {
            width: 70vw;
            height: 20vh;
            color: red;
            background: pink;
            margin: auto;
            margin-top: 50px;
            border: 2px solid black;
            border-radius: 50px;

        }

        p {
            text-align: center;
            margin-top: 40px;
            font-size: large;
        }
        footer{
            width: 100%;
            height: 100px;
            background: black;
            margin-top: 30px;
            color: white;
        }
    </style>
</head>

<body>
    <header class="up">
        <nav class="nav">

        </nav>
    </header>
    <div class="bb">
        <div class="box box1">

        </div>
        <div class="box box2">

        </div>
    </div>
    <div class="content">
        <p>
            Welcome to the free web development course
        </p>
    </div>
    <div class="logo">

    </div>
    <footer>
        <div class="footer">

        </div>
    </footer>
</body>

</html>
